name: Build Prisma Binaries for Liara

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Prisma
        run: |
          npm init -y
          npm install prisma@7.8.0 @prisma/client@7.8.0

      - name: Create schema.prisma with correct binaryTarget and dummy DB
        run: |
          mkdir -p prisma
          cat > prisma/schema.prisma << 'EOF'
          generator client {
            provider = "prisma-client-js"
            binaryTargets = ["debian-openssl-3.0.x"]
          }
          
          datasource db {
            provider = "postgresql"
            url      = env("DATABASE_URL")
          }
          EOF

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: List engines directory for debugging
        run: ls -la node_modules/@prisma/engines/ || echo "Directory not found"

      - name: Upload engines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: prisma-engines-liara
          path: node_modules/@prisma/engines/