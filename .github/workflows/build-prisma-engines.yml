name: Build Prisma Engines

on:
  workflow_dispatch:  # این خط باعث می‌شود بتوانید آن را به صورت دستی اجرا کنید

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # این step مهم است: بیلد را بدون چک‌سام و با مشخص کردن پلتفرم اجرا می‌کند
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          PRISMA_QUERY_ENGINE_LIBRARY: dummy
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: 1

      - name: Upload Engines Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prisma-engines
          path: node_modules/@prisma/engines/